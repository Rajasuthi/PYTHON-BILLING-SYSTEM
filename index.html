<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Billing UI</title>
    <link rel="stylesheet" href="ui.css">
</head>
<body background-color="green">

<div class="box">
    <h1>🛒 Grocery Billing UI</h1>

    <div class="inputs">
        <input type="text" placeholder="Item Name">
        <input type="number" placeholder="Quantity">
        <input type="number" placeholder="Price per unit">
        <button>Add Item</button>
    </div>

    <table>
        <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Rate</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Example</td>
            <td>1</td>
            <td>30</td>
            <td>30</td>
        </tr>
    </table>

    <h2 class="total">Total: ₹0</h2>

</div>

</body>
</html>
