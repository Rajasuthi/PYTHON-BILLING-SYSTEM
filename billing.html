<!DOCTYPE html>
<html>
<head>
    <title>Simple Billing System</title>

    <style>
        body{
            font-family: Arial;
            margin: 0;
            background:#f4f6ff;
        }

        header{
            background:#3a57ff;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width: 80%;
            margin:auto;
            margin-top:20px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .logo img{
            width:120px;
        }

        .row{
            display:flex;
            justify-content:space-between;
            margin-top:20px;
        }

        input{
            padding:8px;
            width:90%;
            border-radius:5px;
            border:1px solid gray;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table, th, td{
            border:1px solid gray;
        }

        th, td{
            padding:10px;
            text-align:center;
        }

        .total{
            text-align:right;
            font-size:18px;
            margin-top:10px;
        }

        .btn{
            background:#3a57ff;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover{
            background:#1628aa;
        }

        footer{
            margin-top:20px;
            text-align:center;
            color:gray;
        }

        a{
            color:#3a57ff;
        }
    </style>
</head>

<body>

<header>
    <h1>Billing System</h1>
</header>

<div class="container">

    <div class="logo">
        <img src="shop.png" alt="Shop Logo">
    </div>

    <div class="row">
        <div>
            <label>Customer Name</label><br>
            <input type="text">
        </div>

        <div>
            <label>Phone Number</label><br>
            <input type="text">
        </div>
    </div>

    <table>
        <tr>
            <th>Item Image</th>
            <th>Item Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
        </tr>

        <tr>
            <td><img src="dress.jpg" width="70"></td>
            <td>Dress</td>
            <td>2</td>
            <td>₹500</td>
            <td>₹1000</td>
        </tr>

        <tr>
            <td><img src="shoes.jpg" width="70"></td>
            <td>Shoes</td>
            <td>1</td>
            <td>₹800</td>
            <td>₹800</td>
        </tr>
    </table>

    <p class="total"><b>Grand Total : ₹1800</b></p>

    <button class="btn">Download Bill</button>
    <button class="btn">Print Bill</button>

    <footer>
        Visit our website:
        <a href="https://example.com" target="_blank">Click Here</a>
    </footer>

</div>

</body>
</html>
